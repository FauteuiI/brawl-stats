<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest+Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10">
        <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg">BRAWL TRACKER</h1>
        <p class="text-gray-400 mt-2">Maps en direct et stats des joueurs</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <section>
            <h2 class="text-2xl brawl-font mb-4 text-blue-400">Maps Actuelles</h2>
            <div id="maps-container" class="space-y-4">
                <p>Chargement des maps...</p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl brawl-font mb-4 text-green-400">Chercher un Joueur</h2>
            <div class="card p-6">
                <div class="flex gap-2">
                    <input type="text" id="playerTag" placeholder="Tag ex: #PL2V82" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none">
                    <button onclick="searchPlayer()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded transition">OK</button>
                </div>
                <div id="player-result" class="mt-6 hidden">
                    </div>
            </div>
        </section>

    </main>

    <script>
    const PROXY = "https://corsproxy.io/?";
    const API_URL = "https://api.brawlapi.com/v1/events";

    async function loadMaps() {
        const container = document.getElementById('maps-container');
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL));
            const data = await res.json();
            
            if (!data.active || data.active.length === 0) {
                container.innerHTML = "<p class='text-gray-400'>Aucune map active trouvée.</p>";
                return;
            }

            container.innerHTML = '';

            data.active.slice(0, 3).forEach(event => {
                // Le "?" permet de dire : "si ça existe, prends le nom, sinon mets 'Inconnu'"
                const mapName = event.map?.name || "Map Inconnue";
                const modeName = event.map?.gameMode?.name || "Mode Inconnu";
                const mapImg = event.map?.imageUrl || "";

                container.innerHTML += `
                    <div class="card overflow-hidden flex items-center mb-4 p-2 bg-gray-700 rounded-xl border-2 border-gray-600 shadow-lg">
                        <img src="${mapImg}" class="w-20 h-20 object-cover rounded-lg bg-gray-800" onerror="this.src='https://placehold.co/100x100?text=Brawl'">
                        <div class="ml-4">
                            <p class="font-bold text-lg text-yellow-400">${mapName}</p>
                            <p class="text-sm text-blue-300 uppercase font-bold">${modeName}</p>
                        </div>
                    </div>`;
            });
        } catch (e) { 
            console.error("Erreur détaillée:", e);
            container.innerHTML = "<p class='text-red-500'>Erreur de connexion. Réessaie.</p>";
        }
    }

    async function searchPlayer() {
        let tag = document.getElementById('playerTag').value.replace('#', '').trim();
        const resultDiv = document.getElementById('player-result');
        if(!tag) return alert("Mets un tag !");

        resultDiv.innerHTML = "<p class='text-center animate-pulse'>Recherche...</p>";
        resultDiv.classList.remove('hidden');

        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://api.brawlapi.com/v1/player/${tag}`));
            const player = await res.json();

            resultDiv.innerHTML = `
                <div class="text-center p-4 bg-gray-800 rounded-xl border-2 border-green-500">
                    <p class="text-3xl brawl-font text-yellow-400 mb-2">${player.name || 'Inconnu'}</p>
                    <p class="text-xl font-bold">${player.trophies || 0} 🏆</p>
                    <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
                        <div class="bg-gray-700 p-2 rounded">Brawlers: <span class="text-green-400 font-bold">${player.brawlers?.length || 0}</span></div>
                        <div class="bg-gray-700 p-2 rounded">Niveau: <span class="text-blue-400 font-bold">${player.expLevel || 0}</span></div>
                    </div>
                </div>`;
        } catch (e) {
            resultDiv.innerHTML = "<p class='text-red-400 text-center'>Joueur non trouvé.</p>";
        }
    }

    loadMaps();
</script>
</body>
</html>
