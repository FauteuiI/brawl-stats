<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest+Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10">
        <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg">BRAWL TRACKER</h1>
        <p class="text-gray-400 mt-2">Maps en direct et stats des joueurs</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <section>
            <h2 class="text-2xl brawl-font mb-4 text-blue-400">Maps Actuelles</h2>
            <div id="maps-container" class="space-y-4">
                <p>Chargement des maps...</p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl brawl-font mb-4 text-green-400">Chercher un Joueur</h2>
            <div class="card p-6">
                <div class="flex gap-2">
                    <input type="text" id="playerTag" placeholder="Tag ex: #PL2V82" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none">
                    <button onclick="searchPlayer()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded transition">OK</button>
                </div>
                <div id="player-result" class="mt-6 hidden">
                    </div>
            </div>
        </section>

    </main>

    <script>
    // Ce proxy va "nettoyer" la requête pour que BrawlAPI l'accepte
    const PROXY = "https://corsproxy.io/?";
    const API_URL = "https://api.brawlapi.com/v1/events";

    async function loadMaps() {
        const container = document.getElementById('maps-container');
        try {
            // On combine le proxy et l'URL de l'API
            const res = await fetch(PROXY + encodeURIComponent(API_URL));
            
            if (!res.ok) throw new Error("Erreur réseau");
            
            const data = await res.json();
            container.innerHTML = '';

            // On affiche les 3 premières maps
            data.active.slice(0, 3).forEach(event => {
                container.innerHTML += `
                    <div class="card overflow-hidden flex items-center mb-4 p-2 bg-gray-700 rounded-xl border-2 border-gray-600">
                        <img src="${event.map.imageUrl}" class="w-20 h-20 object-cover rounded-lg border border-gray-500">
                        <div class="ml-4">
                            <p class="font-bold text-lg text-yellow-400">${event.map.name}</p>
                            <p class="text-sm text-blue-300 uppercase">${event.map.gameMode.name}</p>
                        </div>
                    </div>
                `;
            });
        } catch (e) { 
            console.error("Erreur détaillée:", e);
            container.innerHTML = "<p class='text-red-500 bg-red-900/20 p-3 rounded'>Impossible de charger les maps. Réessaie dans 1 minute.</p>";
        }
    }

    async function searchPlayer() {
        let tag = document.getElementById('playerTag').value.replace('#', '').trim();
        const resultDiv = document.getElementById('player-result');
        
        if(!tag) return alert("Mets un tag (ex: PL2V82) !");

        resultDiv.innerHTML = "<p class='text-center animate-pulse'>Recherche en cours...</p>";
        resultDiv.classList.remove('hidden');

        try {
            // On utilise aussi le proxy pour le joueur
            const playerUrl = `https://api.brawlapi.com/v1/player/${tag}`;
            const res = await fetch(PROXY + encodeURIComponent(playerUrl));
            
            if(!res.ok) throw new Error("Joueur non trouvé");
            
            const player = await res.json();

            resultDiv.innerHTML = `
                <div class="text-center p-4 bg-gray-800 rounded-xl border-2 border-green-500">
                    <p class="text-3xl brawl-font text-yellow-400 mb-2">${player.name}</p>
                    <p class="text-xl font-bold">${player.trophies} 🏆</p>
                    <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
                        <div class="bg-gray-700 p-2 rounded shadow-inner">Brawlers: <span class="text-green-400 font-bold">${player.brawlers.length}</span></div>
                        <div class="bg-gray-700 p-2 rounded shadow-inner">Niveau: <span class="text-blue-400 font-bold">${player.expLevel}</span></div>
                    </div>
                </div>
            `;
        } catch (e) {
            resultDiv.innerHTML = "<p class='text-red-500 text-center font-bold bg-red-900/20 p-2 rounded'>Joueur introuvable ou tag invalide.</p>";
        }
    }

    // Lancement automatique
    loadMaps();
</script>
</body>
</html>
