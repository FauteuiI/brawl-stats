<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest+Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10">
        <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg">BRAWL TRACKER</h1>
        <p class="text-gray-400 mt-2">Maps en direct et stats des joueurs</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <section>
            <h2 class="text-2xl brawl-font mb-4 text-blue-400">Maps Actuelles</h2>
            <div id="maps-container" class="space-y-4">
                <p>Chargement des maps...</p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl brawl-font mb-4 text-green-400">Chercher un Joueur</h2>
            <div class="card p-6">
                <div class="flex gap-2">
                    <input type="text" id="playerTag" placeholder="Tag ex: #PL2V82" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none">
                    <button onclick="searchPlayer()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded transition">OK</button>
                </div>
                <div id="player-result" class="mt-6 hidden">
                    </div>
            </div>
        </section>

    </main>

    <script>
    const PROXY = "https://corsproxy.io/?";
    const API_URL = "https://api.brawlapi.com/v1/events";

    async function loadMaps() {
        const container = document.getElementById('maps-container');
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL));
            const data = await res.json();
            
            if (!data.active) return;
            container.innerHTML = '';

            // On enlève le .slice(0,3) pour avoir TOUTES les maps
            data.active.forEach(event => {
                // RADAR POUR LE NOM DU MODE
                const modeName = event.event?.mode?.name || 
                                 event.map?.gameMode?.name || 
                                 event.gameMode?.name || "Mode Inconnu";

                // RADAR POUR L'IMAGE DE LA MAP
                const mapImg = event.map?.imageUrl || 
                               event.event?.map?.imageUrl || 
                               "https://cdn.brawlapi.com/unknown.png";

                const mapName = event.map?.name || "Map Inconnue";

                container.innerHTML += `
                    <div class="card overflow-hidden flex items-center mb-4 p-3 bg-gray-800 rounded-2xl border-2 border-gray-600 shadow-2xl">
                        <div class="relative w-24 h-24 flex-shrink-0">
                            <img src="${mapImg}" class="w-full h-full object-cover rounded-xl border border-gray-500 shadow-inner" 
                                 onerror="this.src='https://cdn.brawlapi.com/unknown.png'">
                        </div>
                        <div class="ml-5">
                            <p class="font-bold text-xl text-yellow-400 tracking-wide brawl-font">${mapName}</p>
                            <p class="text-xs font-black text-blue-400 uppercase tracking-tighter bg-blue-900/30 px-2 py-1 rounded inline-block mt-1 border border-blue-800">
                                ${modeName}
                            </p>
                        </div>
                    </div>`;
            });
        } catch (e) { 
            console.error(e);
            container.innerHTML = "<p class='text-red-500'>Erreur de connexion...</p>";
        }
    }

    async function searchPlayer() {
        let tag = document.getElementById('playerTag').value.replace('#', '').trim();
        const resultDiv = document.getElementById('player-result');
        if(!tag) return alert("Mets un tag !");
        resultDiv.innerHTML = "<p class='text-center animate-pulse text-yellow-500'>Recherche du compte...</p>";
        resultDiv.classList.remove('hidden');

        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://api.brawlapi.com/v1/player/${tag}`));
            const player = await res.json();

            resultDiv.innerHTML = `
                <div class="text-center p-6 bg-gradient-to-b from-gray-700 to-gray-800 rounded-2xl border-4 border-yellow-500 shadow-2xl">
                    <p class="text-4xl brawl-font text-white drop-shadow-md mb-2">${player.name}</p>
                    <div class="inline-block bg-black/40 px-4 py-1 rounded-full border border-yellow-600/50">
                        <p class="text-2xl font-black text-yellow-400">${player.trophies.toLocaleString()} 🏆</p>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-4 text-sm font-bold">
                        <div class="bg-gray-900/50 p-3 rounded-lg border border-gray-600">
                            <p class="text-gray-400">BRAWLERS</p>
                            <p class="text-2xl text-green-400 font-black">${player.brawlers?.length || 0}</p>
                        </div>
                        <div class="bg-gray-900/50 p-3 rounded-lg border border-gray-600">
                            <p class="text-gray-400">NIVEAU</p>
                            <p class="text-2xl text-blue-400 font-black">${player.expLevel || 0}</p>
                        </div>
                    </div>
                </div>`;
        } catch (e) {
            resultDiv.innerHTML = "<p class='text-red-500 text-center bg-red-900/30 p-4 rounded-xl border border-red-800'>Joueur introuvable ! Vérifie le Tag.</p>";
        }
    }

    loadMaps();
</script>
</body>
</html>
