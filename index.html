<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background: #0f172a; color: white; font-family: 'sans-serif'; }
        .brawl-font { font-family: 'Luckiest Guy', cursive; }
    </style>
</head>
<body class="p-5">

<div class="max-w-xl mx-auto">
    <h1 class="text-4xl text-yellow-400 brawl-font text-center mb-10 uppercase tracking-widest">BRAWL STATS</h1>

    <!-- RECHERCHE -->
    <div class="bg-gray-800 p-6 rounded-3xl border-4 border-gray-700 shadow-2xl mb-10">
        <div class="flex gap-2">
            <input type="text" id="tagInput" placeholder="Tag sans le #" class="w-full p-4 rounded-xl bg-gray-900 border-2 border-gray-600 focus:border-yellow-500 outline-none">
            <button onclick="getData()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black px-6 rounded-xl uppercase">OK</button>
        </div>
        <div id="playerBox" class="mt-6 hidden"></div>
    </div>

    <!-- MAPS -->
    <h2 class="text-xl brawl-font text-blue-400 mb-4 uppercase">Maps en cours</h2>
    <div id="mapsBox" class="space-y-4"></div>
</div>

<script>
const URL_SERVEUR = "https://brawl-stats-amkx.onrender.com";

async function getData() {
    const tag = document.getElementById('tagInput').value.trim();
    const box = document.getElementById('playerBox');
    if(!tag) return;

    box.innerHTML = "<p class='text-center animate-bounce'>CHARGEMENT...</p>";
    box.classList.remove('hidden');

    try {
        const res = await fetch(`${URL_SERVEUR}/api/player/${tag}`);
        const data = await res.json();

        if(data.error) throw new Error();

        // AFFICHAGE PRECIS DES DONNÉES BRAWLAPI
        box.innerHTML = `
            <div class="text-center p-6 bg-gray-900 rounded-2xl border-2 border-yellow-500">
                <p class="text-3xl brawl-font text-white uppercase">${data.name}</p>
                <p class="text-4xl text-yellow-400 font-black my-2">${data.trophies.toLocaleString()} 🏆</p>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div class="bg-gray-800 p-3 rounded-lg">
                        <p class="text-gray-400 text-xs uppercase">Brawlers</p>
                        <p class="text-xl font-bold">${data.brawlersCount}</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded-lg">
                        <p class="text-gray-400 text-xs uppercase">Niveau</p>
                        <p class="text-xl font-bold">${data.expLevel}</p>
                    </div>
                </div>
            </div>`;
    } catch (e) {
        box.innerHTML = "<p class='text-red-500 text-center font-bold'>TAG INVALIDE OU SERVEUR EN VEILLE</p>";
    }
}

async function loadMaps() {
    const box = document.getElementById('mapsBox');
    try {
        const res = await fetch(`${URL_SERVEUR}/api/maps`);
        const data = await res.json();
        const events = data.active || data;

        box.innerHTML = "";
        events.forEach(e => {
            box.innerHTML += `
                <div class="flex items-center p-3 bg-gray-800 rounded-2xl border-2 border-gray-700">
                    <img src="${e.map.imageUrl}" class="w-16 h-16 rounded-lg object-cover" onerror="this.src='https://cdn.brawlify.com/gamemodes/gem-grab.png'">
                    <div class="ml-4">
                        <p class="brawl-font text-yellow-400 uppercase">${e.map.name}</p>
                        <p class="text-xs text-gray-400 font-bold uppercase">${e.map.gameMode.name}</p>
                    </div>
                </div>`;
        });
    } catch (e) {
        box.innerHTML = "<p class='text-gray-500 text-center'>Impossible de charger les maps.</p>";
    }
}

loadMaps();
</script>

</body>
</html>
