<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

<header class="text-center mb-10">
    <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg uppercase tracking-wider">BRAWL TRACKER</h1>
    <p class="text-gray-400 mt-2">Connecté au serveur Render 🚀</p>
</header>

<main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
    
    <!-- SECTION MAPS -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-blue-400 uppercase">Maps Actuelles</h2>
        <div id="maps-container" class="space-y-4">
            <p class="animate-pulse">Réveil du serveur Render...</p>
        </div>
    </section>

    <!-- SECTION RECHERCHE -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-green-400 uppercase">Chercher un Joueur</h2>
        <div class="card p-6 shadow-2xl">
            <div class="flex gap-2">
                <input type="text" id="playerTag" placeholder="Tag ex: #U0LGVUV9"
                    class="w-full p-3 rounded bg-gray-800 border-2 border-gray-600 text-white outline-none focus:border-yellow-500 transition-all">
                <button onclick="searchPlayer()"
                    class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-2 px-6 rounded-xl transition transform active:scale-95">
                    OK
                </button>
            </div>
            <div id="player-result" class="mt-6 hidden"></div>
        </div>
    </section>

</main>

<script>
// Ton URL Render exacte (vue sur ta capture d'écran)
const API_URL = "https://brawl-stats-amkx.onrender.com"; 

async function loadMaps() {
    const container = document.getElementById('maps-container');

    try {
        const res = await fetch(`${API_URL}/api/maps`);
        if (!res.ok) throw new Error("Erreur Serveur");
        
        const data = await res.json();
        const events = data.active || data; 

        if (!events || events.length === 0) {
            container.innerHTML = "<p class='text-yellow-500'>Aucune map active pour le moment.</p>";
            return;
        }

        container.innerHTML = '';

        events.forEach(event => {
            const mapName = event.map?.name || "Map Inconnue";
            
            // On récupère l'image de la map, sinon une icône par défaut
            let imgUrl = event.map?.imageUrl;
            if (!imgUrl) {
                // Secours : icône du mode de jeu en minuscules pour éviter les erreurs 404
                const mode = event.map?.gameMode?.name?.toLowerCase().replace(/\s+/g, '-') || 'gem-grab';
                imgUrl = `https://cdn.brawlify.com/gamemodes/${mode}.png`;
            }

            container.innerHTML += `
                <div class="card flex items-center p-3 bg-gray-800 rounded-2xl border-2 border-gray-600 hover:border-blue-400 transition-all shadow-lg">
                    <div class="w-20 h-20 flex-shrink-0 bg-gray-900 rounded-xl overflow-hidden border border-gray-500">
                        <img src="${imgUrl}" 
                             class="w-full h-full object-cover" 
                             onerror="this.src='https://cdn.brawlify.com/gamemodes/gem-grab.png'">
                    </div>
                    <div class="ml-5">
                        <p class="font-bold text-xl text-yellow-400 tracking-wide brawl-font uppercase">${mapName}</p>
                        <p class="text-[10px] font-black text-white uppercase bg-blue-600 px-3 py-1 rounded-full mt-1 border border-blue-400 inline-block">
                            MAP ACTIVE
                        </p>
                    </div>
                </div>`;
        });

    } catch (e) {
        console.error("Erreur Maps:", e);
        container.innerHTML = `
            <div class="p-4 border-2 border-dashed border-gray-600 rounded-xl text-center">
                <p class="text-gray-400 text-sm italic">Le serveur Render se réveille...</p>
                <p class="text-[10px] text-gray-500 mt-2 uppercase">Réessaie dans 20 secondes</p>
            </div>`;
    }
}

// Garde aussi ta fonction searchPlayer() ici en dessous...
// Et n'oublie pas d'appeler loadMaps() à la fin !
loadMaps();
</script>
</body>
</html>
