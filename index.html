<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats - API Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

<header class="text-center mb-10">
    <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg uppercase">BRAWL TRACKER</h1>
    <p class="text-gray-400 mt-2">API Supercell Directe 🛡️</p>
</header>

<main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
    
    <!-- SECTION MAPS -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-blue-400 uppercase text-center md:text-left">Maps Actuelles</h2>
        <div id="maps-container" class="space-y-4">
            <p class="text-center text-gray-500 italic">Connexion au serveur...</p>
        </div>
    </section>

    <!-- SECTION RECHERCHE -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-green-400 uppercase text-center md:text-left">Chercher un Joueur</h2>
        <div class="card p-6 shadow-2xl">
            <div class="flex gap-2">
                <input type="text" id="playerTag" placeholder="Tag ex: #U0LGVUV9"
                    class="w-full p-3 rounded bg-gray-800 border-2 border-gray-600 text-white outline-none focus:border-yellow-500 transition-all">
                <button onclick="searchPlayer()"
                    class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-2 px-6 rounded-xl transition transform active:scale-95">
                    OK
                </button>
            </div>
            <div id="player-result" class="mt-6 hidden"></div>
        </div>
    </section>

</main>

<script>
// TON URL RENDER (Garde bien ton lien amkx)
const API_URL = "https://brawl-stats-amkx.onrender.com"; 

async function loadMaps() {
    const container = document.getElementById('maps-container');
    try {
        const res = await fetch(`${API_URL}/api/maps`);
        const data = await res.json();
        
        // On s'adapte à BrawlAPI pour les maps (car Supercell ne donne pas les images de maps)
        const events = data.active || data; 
        container.innerHTML = '';

        events.forEach(event => {
            const mapName = event.map?.name || "Map Inconnue";
            const mode = event.map?.gameMode?.name?.toLowerCase().replace(/\s+/g, '-') || 'gem-grab';
            let imgUrl = event.map?.imageUrl || `https://cdn.brawlify.com/gamemodes/${mode}.png`;

            container.innerHTML += `
                <div class="card flex items-center p-3 bg-gray-800 rounded-2xl border-2 border-gray-600">
                    <div class="w-16 h-16 flex-shrink-0 bg-gray-900 rounded-xl overflow-hidden border border-gray-500">
                        <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://cdn.brawlify.com/gamemodes/gem-grab.png'">
                    </div>
                    <div class="ml-4">
                        <p class="font-bold text-lg text-yellow-400 brawl-font uppercase">${mapName}</p>
                        <p class="text-[10px] font-black text-blue-300 uppercase italic">Active</p>
                    </div>
                </div>`;
        });
    } catch (e) {
        container.innerHTML = "<p class='text-red-400 text-center'>Serveur en veille. Réessaie dans 20s.</p>";
    }
}

async function searchPlayer() {
    let tag = document.getElementById('playerTag').value.replace('#', '').trim();
    const resultDiv = document.getElementById('player-result');

    if(!tag) return alert("Mets un tag !");

    resultDiv.innerHTML = "<p class='text-center animate-pulse text-yellow-500 font-bold'>APPEL API SUPERCELL...</p>";
    resultDiv.classList.remove('hidden');

    try {
        const res = await fetch(`${API_URL}/api/player/${tag}`);
        const player = await res.json();

        if (player.error) throw new Error(player.error);

        resultDiv.innerHTML = `
        <div class="text-center p-6 bg-gray-800 rounded-2xl border-4 border-yellow-500 shadow-2xl">
            <p class="text-4xl brawl-font text-white mb-2 uppercase">${player.name}</p>
            <div class="inline-block bg-black/40 px-6 py-2 rounded-full border border-yellow-600/50">
                <p class="text-2xl font-black text-yellow-400">${(player.trophies || 0).toLocaleString()} 🏆</p>
            </div>
            <div class="mt-6 grid grid-cols-2 gap-4 text-xs font-bold uppercase">
                <div class="bg-gray-900/50 p-3 rounded-lg border border-gray-600 text-center">
                    <p class="text-gray-400">Brawlers</p>
                    <p class="text-2xl text-green-400 font-black">${player.brawlers?.length || 0}</p>
                </div>
                <div class="bg-gray-900/50 p-3 rounded-lg border border-gray-600 text-center">
                    <p class="text-gray-400">Niveau</p>
                    <p class="text-2xl text-blue-400 font-black">${player.expLevel || 0}</p>
                </div>
            </div>
        </div>`;
    } catch (e) {
        resultDiv.innerHTML = `
            <div class="p-4 bg-red-900/20 border border-red-500 rounded-xl text-center">
                <p class="text-red-500 font-bold">ERREUR SUPERCELL</p>
                <p class="text-white text-[10px] mt-1 italic">Vérifie l'IP 0.0.0.0 ou ton Token</p>
            </div>`;
    }
}

loadMaps();
</script>

</body>
</html>
