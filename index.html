<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest+Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10">
        <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg">BRAWL TRACKER</h1>
        <p class="text-gray-400 mt-2">Maps en direct et stats des joueurs</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <section>
            <h2 class="text-2xl brawl-font mb-4 text-blue-400">Maps Actuelles</h2>
            <div id="maps-container" class="space-y-4">
                <p>Chargement des maps...</p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl brawl-font mb-4 text-green-400">Chercher un Joueur</h2>
            <div class="card p-6">
                <div class="flex gap-2">
                    <input type="text" id="playerTag" placeholder="Tag ex: #PL2V82" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none">
                    <button onclick="searchPlayer()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded transition">OK</button>
                </div>
                <div id="player-result" class="mt-6 hidden">
                    </div>
            </div>
        </section>

    </main>

    <script>
    async function loadMaps() {
        const container = document.getElementById('maps-container');
        // Proxy AllOrigins pour les données
        const proxyUrl = "https://api.allorigins.win/get?url=";
        const apiUrl = encodeURIComponent("https://api.brawlapi.com/v1/events");

        try {
            const response = await fetch(proxyUrl + apiUrl);
            const result = await response.json();
            const data = JSON.parse(result.contents);
            
            if (!data.active) return;
            container.innerHTML = '';

            data.active.forEach(event => {
                const mapName = event.map?.name || "Map Inconnue";
                const modeName = event.map?.gameMode?.name || "BRAWL STARS";
                
                // Au lieu de l'image de l'API qui bloque, on met une icône de secours Google
                // On utilise une couleur différente selon le mode pour que ce soit beau
                const iconColor = mapName.length % 2 === 0 ? "text-blue-500" : "text-yellow-500";

                container.innerHTML += `
                    <div class="card overflow-hidden flex items-center mb-4 p-3 bg-gray-800 rounded-2xl border-2 border-gray-600 shadow-2xl">
                        <div class="w-20 h-20 flex-shrink-0 bg-gray-900 rounded-xl flex items-center justify-center border border-gray-500">
                             <span style="font-size: 40px;">🎮</span>
                        </div>
                        <div class="ml-5">
                            <p class="font-bold text-xl text-yellow-400 tracking-wide brawl-font">${mapName}</p>
                            <p class="text-xs font-black text-white uppercase bg-blue-600 px-3 py-1 rounded-full mt-1">
                                ${modeName}
                            </p>
                        </div>
                    </div>`;
            });
        } catch (e) {
            container.innerHTML = "<p class='text-red-500 font-bold'>Serveur en maintenance, réessaie plus tard.</p>";
        }
    }

    async function searchPlayer() {
        let tag = document.getElementById('playerTag').value.replace('#', '').trim();
        const resultDiv = document.getElementById('player-result');
        if(!tag) return alert("Mets un tag !");
        resultDiv.innerHTML = "<p class='text-yellow-500 font-bold animate-bounce text-center'>⚡ RECHERCHE EN COURS...</p>";
        resultDiv.classList.remove('hidden');

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.brawlapi.com/v1/player/'+tag)}`);
            const result = await res.json();
            const player = JSON.parse(result.contents);
            
            resultDiv.innerHTML = `
                <div class="text-center p-6 bg-gray-800 rounded-2xl border-4 border-yellow-500 shadow-2xl">
                    <p class="text-4xl brawl-font text-white mb-2 uppercase">${player.name}</p>
                    <div class="bg-black/50 py-2 rounded-full mb-4">
                        <p class="text-3xl font-black text-yellow-400">${player.trophies.toLocaleString()} 🏆</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-xs font-bold uppercase">
                        <div class="bg-gray-700 p-2 rounded">Brawlers: <br><span class="text-xl text-green-400">${player.brawlers?.length || 0}</span></div>
                        <div class="bg-gray-700 p-2 rounded">Niveau: <br><span class="text-xl text-blue-400">${player.expLevel || 0}</span></div>
                    </div>
                </div>`;
        } catch (e) {
            resultDiv.innerHTML = "<p class='text-red-500 font-bold'>Tag introuvable ou API saturée !</p>";
        }
    }

    loadMaps();
</script>
</body>
</html>
