<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

<header class="text-center mb-10">
    <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg uppercase tracking-wider">BRAWL TRACKER</h1>
    <p class="text-gray-400 mt-2">Connecté au serveur Render 🚀</p>
</header>

<main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
    
    <!-- SECTION MAPS -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-blue-400 uppercase">Maps Actuelles</h2>
        <div id="maps-container" class="space-y-4">
            <p class="animate-pulse">Réveil du serveur Render...</p>
        </div>
    </section>

    <!-- SECTION RECHERCHE -->
    <section>
        <h2 class="text-2xl brawl-font mb-4 text-green-400 uppercase">Chercher un Joueur</h2>
        <div class="card p-6 shadow-2xl">
            <div class="flex gap-2">
                <input type="text" id="playerTag" placeholder="Tag ex: #U0LGVUV9"
                    class="w-full p-3 rounded bg-gray-800 border-2 border-gray-600 text-white outline-none focus:border-yellow-500 transition-all">
                <button onclick="searchPlayer()"
                    class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-2 px-6 rounded-xl transition transform active:scale-95">
                    OK
                </button>
            </div>
            <div id="player-result" class="mt-6 hidden"></div>
        </div>
    </section>

</main>

<script>
// ⚠️ TON URL RENDER (Vérifiée sur ta capture d'écran)
const API_URL = "https://brawl-stats-amkx.onrender.com"; 

async function loadMaps() {
    const container = document.getElementById('maps-container');

    try {
        const res = await fetch(`${API_URL}/api/maps`);
        const data = await res.json();

        // BrawlAPI renvoie souvent une liste d'événements
        const events = data.active || data; 
        if (!events || events.length === 0) throw new Error("Pas de maps");

        container.innerHTML = '';

        events.forEach(event => {
            const mapName = event.map?.name || "Map Inconnue";
            // Correction URL Image pour BrawlAPI
            let imgUrl = event.map?.imageUrl || `https://cdn.brawlify.com/gamemodes/${event.map?.gameMode?.name.replace(/\s+/g, '') || 'GemGrab'}.png`;

            container.innerHTML += `
                <div class="card flex items-center p-3 bg-gray-800 rounded-2xl border-2 border-gray-600 hover:border-blue-400 transition-colors">
                    <div class="w-20 h-20 flex-shrink-0 bg-gray-900 rounded-xl overflow-hidden border border-gray-500">
                        <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://cdn.brawlify.com/gamemodes/GemGrab.png'">
                    </div>
                    <div class="ml-5">
                        <p class="font-bold text-xl text-yellow-400 tracking-wide brawl-font uppercase">${mapName}</p>
                        <p class="text-xs font-black text-white uppercase bg-blue-600 px-3 py-1 rounded-full mt-1 border border-blue-400 inline-block">
                            EN DIRECT
                        </p>
                    </div>
                </div>`;
        });

    } catch (e) {
        console.error("Erreur Maps:", e);
        container.innerHTML = "<p class='text-red-400 font-bold'>Serveur en cours de réveil... Réessaie dans 30s.</p>";
    }
}

async function searchPlayer() {
    let tagInput = document.getElementById('playerTag').value.trim();
    if(!tagInput.startsWith('#')) tagInput = '#' + tagInput;
    
    let tag = tagInput.replace('#', '');
    const resultDiv = document.getElementById('player-result');

    if(!tag) return alert("Mets un tag !");

    resultDiv.innerHTML = "<div class='text-center'><p class='animate-bounce text-yellow-500 font-black brawl-font'>CHARGEMENT...</p></div>";
    resultDiv.classList.remove('hidden');

    try {
        const res = await fetch(`${API_URL}/api/player/%23${tag}`);
        const player = await res.json();

        if (player.error || !player.name) {
            throw new Error("Introuvable");
        }

        // MISE À JOUR DES DONNÉES (Adapté à BrawlAPI)
        resultDiv.innerHTML = `
        <div class="text-center p-6 bg-gray-800 rounded-2xl border-4 border-yellow-500 shadow-2xl transform transition-all scale-105">
            <p class="text-4xl brawl-font text-white mb-2 uppercase drop-shadow-md">${player.name}</p>
            
            <div class="inline-block bg-black/50 px-8 py-2 rounded-full border-2 border-yellow-600 mb-4">
                <p class="text-3xl font-black text-yellow-400">${(player.trophies || 0).toLocaleString()} 🏆</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 text-xs font-bold uppercase mt-2">
                <div class="bg-gray-900/80 p-4 rounded-xl border border-gray-700">
                    <p class="text-gray-400 mb-1 text-[10px]">Brawlers</p>
                    <p class="text-2xl text-green-400 font-black">${player.brawlers?.length || 0}</p>
                </div>
                <div class="bg-gray-900/80 p-4 rounded-xl border border-gray-700">
                    <p class="text-gray-400 mb-1 text-[10px]">Niveau Exp</p>
                    <p class="text-2xl text-blue-400 font-black">${player.expLevel || 0}</p>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-700">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Meilleur Score : ${player.highestTrophies || 0}</p>
            </div>
        </div>`;
    } catch (e) {
        resultDiv.innerHTML = `
            <div class="bg-red-900/30 border-2 border-red-500 p-4 rounded-xl text-center">
                <p class="text-red-500 font-black brawl-font">JOUEUR INTROUVABLE !</p>
                <p class="text-white text-[10px] mt-1 italic">Vérifie le tag (ex: U0LGVUV9)</p>
            </div>`;
    }
}

// Lancement au chargement
loadMaps();
</script>

</body>
</html>
