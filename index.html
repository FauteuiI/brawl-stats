<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stats Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { background-color: #1a202c; color: white; }
        .brawl-font { font-family: 'Luckiest+Guy', cursive; }
        .card { background: #2d3748; border-radius: 15px; border: 3px solid #4a5568; }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10">
        <h1 class="text-5xl brawl-font text-yellow-400 drop-shadow-lg">BRAWL TRACKER</h1>
        <p class="text-gray-400 mt-2">Maps en direct et stats des joueurs</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <section>
            <h2 class="text-2xl brawl-font mb-4 text-blue-400">Maps Actuelles</h2>
            <div id="maps-container" class="space-y-4">
                <p>Chargement des maps...</p>
            </div>
        </section>

        <section>
            <h2 class="text-2xl brawl-font mb-4 text-green-400">Chercher un Joueur</h2>
            <div class="card p-6">
                <div class="flex gap-2">
                    <input type="text" id="playerTag" placeholder="Tag ex: #PL2V82" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none">
                    <button onclick="searchPlayer()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded transition">OK</button>
                </div>
                <div id="player-result" class="mt-6 hidden">
                    </div>
            </div>
        </section>

    </main>

    <script>
    async function loadMaps() {
        const container = document.getElementById('maps-container');
        const proxyUrl = "https://api.allorigins.win/get?url=";
        const apiUrl = encodeURIComponent("https://api.brawlapi.com/v1/events");

        try {
            const response = await fetch(proxyUrl + apiUrl);
            const result = await response.json();
            const data = JSON.parse(result.contents);
            
            if (!data.active) return;
            container.innerHTML = '';

            data.active.forEach(event => {
                const mapName = event.map?.name || "Map Inconnue";
                const modeName = event.event?.mode?.name || event.map?.gameMode?.name || "Brawl Stars";
                
                // --- NOUVEAU SYSTÈME D'IMAGES ---
                // Si l'image de l'API rate, on utilise une icône de remplacement propre
                const mapImg = event.map?.imageUrl || "https://cdn.brawlapi.com/unknown.png";

                container.innerHTML += `
                    <div class="card overflow-hidden flex items-center mb-4 p-3 bg-gray-800 rounded-2xl border-2 border-gray-600 shadow-2xl">
                        <div class="relative w-24 h-24 flex-shrink-0 bg-gray-900 rounded-xl overflow-hidden border border-gray-500">
                            <img src="${mapImg}" 
                                 class="w-full h-full object-cover" 
                                 onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/BrawlAPI/BrawlAPI/main/assets/gamemodes/icons/64/gemGrab.png';">
                        </div>
                        <div class="ml-5">
                            <p class="font-bold text-xl text-yellow-400 tracking-wide brawl-font">${mapName}</p>
                            <p class="text-xs font-black text-blue-400 uppercase bg-blue-900/30 px-2 py-1 rounded inline-block mt-1 border border-blue-800">
                                ${modeName}
                            </p>
                        </div>
                    </div>`;
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = "<p class='text-red-500'>Erreur de chargement...</p>";
        }
    }

    // Garde ta fonction searchPlayer comme avant
    async function searchPlayer() {
        let tag = document.getElementById('playerTag').value.replace('#', '').trim();
        const resultDiv = document.getElementById('player-result');
        if(!tag) return alert("Mets un tag !");
        resultDiv.innerHTML = "<p class='text-center animate-pulse text-yellow-500'>RECHERCHE...</p>";
        resultDiv.classList.remove('hidden');
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.brawlapi.com/v1/player/'+tag)}`);
            const result = await res.json();
            const player = JSON.parse(result.contents);
            resultDiv.innerHTML = `<div class="text-center p-6 bg-gray-800 rounded-2xl border-4 border-yellow-500 shadow-2xl">
                <p class="text-3xl brawl-font text-white mb-2">${player.name}</p>
                <p class="text-2xl font-black text-yellow-400">${player.trophies} 🏆</p>
                <div class="mt-4 grid grid-cols-2 gap-4 text-sm font-bold">
                    <div class="bg-gray-900/50 p-2 rounded">Brawlers: ${player.brawlers?.length || 0}</div>
                    <div class="bg-gray-900/50 p-2 rounded">Niveau: ${player.expLevel || 0}</div>
                </div>
            </div>`;
        } catch (e) { resultDiv.innerHTML = "<p class='text-red-500'>Joueur introuvable !</p>"; }
    }

    loadMaps();
</script>
</body>
</html>
